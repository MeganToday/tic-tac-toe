<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      color: #eee;
    }

    .container { text-align: center; width: 100%; max-width: 480px; padding: 0.5rem 1rem; }

    h1 {
      font-size: clamp(1.6rem, 6vw, 2.5rem);
      margin-bottom: 0.5rem;
      letter-spacing: 4px;
      color: #e94560;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    /* ── username screen ── */
    #screen-username p { color: #a8dadc; margin-bottom: 1.5rem; font-size: 1.1rem; }

    #screen-username input {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 8px;
      color: #eee;
      font-size: 1.1rem;
      padding: 0.6rem 1rem;
      width: 100%;
      max-width: 280px;
      margin-bottom: 1rem;
      outline: none;
      text-align: center;
    }

    #screen-username input:focus { border-color: #a8dadc; }

    /* ── waiting room ── */
    #screen-waiting h2 { color: #a8dadc; margin-bottom: 0.4rem; font-size: 1.3rem; }
    #waiting-subtitle { color: #888; font-size: 0.9rem; margin-bottom: 1.2rem; }
    #player-list { list-style: none; margin: 0 auto 1.5rem; max-width: 320px; }

    #player-list li {
      background: #16213e;
      border-radius: 10px;
      padding: 0.7rem 1.2rem;
      margin-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #player-list li .pname { color: #eee; }
    #player-list li .pname.me { color: #888; font-style: italic; }

    #player-list li button.invite-btn {
      padding: 0.3rem 0.9rem;
      font-size: 0.85rem;
      background: #0f3460;
      letter-spacing: 0;
    }

    #player-list li button.invite-btn:hover { background: #1a4a80; }
    #player-list li button.invite-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

    #waiting-status { color: #a8dadc; font-size: 0.95rem; min-height: 1.4rem; margin-bottom: 0.5rem; }

    /* ── modal ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    #modal-overlay.active { display: flex; }

    .modal-box {
      background: #16213e;
      border-radius: 14px;
      padding: 2rem;
      text-align: center;
      max-width: 320px;
      width: 90%;
      border: 1px solid #0f3460;
    }

    .modal-box h3 { color: #a8dadc; margin-bottom: 0.8rem; font-size: 1.2rem; }
    .modal-box p { color: #eee; margin-bottom: 1.4rem; }
    .modal-actions { display: flex; gap: 1rem; justify-content: center; }
    .modal-actions button { min-width: 100px; }

    /* ── game screen ── */
    #screen-game .game-header {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
    }

    .player-tag { padding: 0.25rem 0.7rem; border-radius: 6px; font-weight: bold; }
    .player-tag.x { background: rgba(233,69,96,0.2); color: #e94560; }
    .player-tag.o { background: rgba(168,218,220,0.2); color: #a8dadc; }

    .status { font-size: 1rem; margin-bottom: 0.5rem; min-height: 1.4rem; color: #a8dadc; }

    /* outcome banners */
    #outcome-banner {
      font-size: 1.3rem;
      font-weight: bold;
      margin-bottom: 0.4rem;
      min-height: 1.6rem;
      letter-spacing: 1px;
    }

    #outcome-banner.win  { color: #ffd700; text-shadow: 0 0 16px rgba(255,215,0,0.6); animation: popIn 0.4s ease; }
    #outcome-banner.lose { color: #888; }
    #outcome-banner.draw { color: #a8dadc; }

    @keyframes popIn {
      0%   { transform: scale(0.7); opacity: 0; }
      70%  { transform: scale(1.1); }
      100% { transform: scale(1);   opacity: 1; }
    }

    .board {
      --cell: min(28vw, 28vh, 110px);
      display: grid;
      grid-template-columns: repeat(3, var(--cell));
      grid-template-rows: repeat(3, var(--cell));
      gap: 6px;
      margin: 0 auto 0.6rem;
      width: fit-content;
    }

    .cell {
      background: #16213e;
      border-radius: 10px;
      font-size: calc(var(--cell, 110px) * 0.45);
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken):not(.disabled) { background: #0f3460; transform: scale(1.05); }
    .cell.disabled { cursor: default; }
    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }
    .cell.win { background: #0f3460; animation: pulse 0.4s ease; }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    .scores {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }

    .score-box { background: #16213e; border-radius: 10px; padding: 0.3rem 1rem; min-width: 70px; }
    .score-box .label { font-size: 0.7rem; letter-spacing: 2px; color: #888; text-transform: uppercase; }
    .score-box .value { font-size: 1.4rem; font-weight: bold; }
    .score-box.x-score .value { color: #e94560; }
    .score-box.o-score .value { color: #a8dadc; }
    .score-box.draw-score .value { color: #888; }

    .turn-indicator {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    .turn-x { background: #e94560; }
    .turn-o { background: #a8dadc; }

    /* ── post-game buttons ── */
    #post-game {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.4rem;
    }

    #post-game-status {
      color: #888;
      font-size: 0.85rem;
      min-height: 1rem;
      margin-bottom: 0.1rem;
    }

    .post-game-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
    }

    /* ── rematch waiting state ── */
    #rematch-waiting {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.4rem;
    }

    #rematch-waiting p { color: #a8dadc; font-size: 0.9rem; margin-bottom: 0.1rem; }

    /* ── splash screen ── */
    #screen-splash p {
      color: #a8dadc;
      font-size: 1.3rem;
      margin-top: 0.5rem;
    }

    /* ── buttons ── */
    button {
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.55rem 1.1rem;
      font-size: 0.9rem;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    button:hover { background: #c73652; transform: scale(1.04); }
    button:disabled { opacity: 0.45; cursor: default; transform: none; }

    .btn-secondary { background: #0f3460; }
    .btn-secondary:hover { background: #1a4a80; }

    .btn-ghost {
      background: transparent;
      color: #888;
      font-size: 0.85rem;
      padding: 0.4rem 0.9rem;
      letter-spacing: 0;
      border: 1px solid #333;
    }

    .btn-ghost:hover { background: #16213e; color: #eee; transform: none; }
  </style>
</head>
<body>
<div class="container">
  <h1>TIC TAC TOE</h1>

  <!-- Username screen -->
  <div class="screen active" id="screen-username">
    <p>Welcome to Tic Tac Toe. What is your username?</p>
    <input type="text" id="username-input" placeholder="Enter username" maxlength="20" autocomplete="off" />
    <br>
    <button id="username-btn">Join</button>
  </div>

  <!-- Waiting room -->
  <div class="screen" id="screen-waiting">
    <h2>Waiting Room</h2>
    <p id="waiting-subtitle">Waiting for other players to join…</p>
    <div id="waiting-status"></div>
    <ul id="player-list"></ul>
  </div>

  <!-- Game screen -->
  <div class="screen" id="screen-game">
    <div class="game-header">
      <span class="player-tag x" id="tag-x">X: —</span>
      <span class="player-tag o" id="tag-o">O: —</span>
    </div>

    <div class="scores">
      <div class="score-box x-score">
        <div class="label">X</div>
        <div class="value" id="score-x">0</div>
      </div>
      <div class="score-box draw-score">
        <div class="label">Draw</div>
        <div class="value" id="score-draw">0</div>
      </div>
      <div class="score-box o-score">
        <div class="label">O</div>
        <div class="value" id="score-o">0</div>
      </div>
    </div>

    <div id="outcome-banner"></div>
    <div class="status" id="status"></div>

    <div class="board" id="board">
      <div class="cell" data-i="0"></div>
      <div class="cell" data-i="1"></div>
      <div class="cell" data-i="2"></div>
      <div class="cell" data-i="3"></div>
      <div class="cell" data-i="4"></div>
      <div class="cell" data-i="5"></div>
      <div class="cell" data-i="6"></div>
      <div class="cell" data-i="7"></div>
      <div class="cell" data-i="8"></div>
    </div>

    <!-- Post-game options -->
    <div id="post-game">
      <div id="post-game-status"></div>
      <div class="post-game-row">
        <button id="btn-play-again">Play Again</button>
        <button id="btn-play-someone-else" class="btn-secondary">Play Someone Else</button>
        <button id="btn-exit-game" class="btn-ghost">Exit Game</button>
      </div>
    </div>

    <!-- Rematch waiting state (after sending play-again invite) -->
    <div id="rematch-waiting">
      <p id="rematch-status">Invitation sent! Waiting for response…</p>
      <div class="post-game-row">
        <button id="btn-rematch-someone-else" class="btn-secondary">Play Someone Else</button>
        <button id="btn-rematch-exit" class="btn-ghost">Exit Game</button>
      </div>
    </div>
  </div>

  <!-- Splash screen -->
  <div class="screen" id="screen-splash">
    <p>Thanks for playing!</p>
  </div>
</div>

<!-- Invite modal -->
<div id="modal-overlay">
  <div class="modal-box">
    <h3 id="modal-title">Game Invitation</h3>
    <p id="modal-body"></p>
    <div class="modal-actions">
      <button id="modal-accept">Accept</button>
      <button id="modal-decline" class="btn-secondary">Decline</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import {
    getDatabase, ref, set, get, push, onValue, onDisconnect,
    remove, update, serverTimestamp, off
  } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

  const app = initializeApp({
    apiKey: "AIzaSyARqWmYX3K6cIjyor7Km5rNSSQyMdL1d7w",
    authDomain: "mt-s-project.firebaseapp.com",
    databaseURL: "https://mt-s-project-default-rtdb.firebaseio.com",
    projectId: "mt-s-project",
    storageBucket: "mt-s-project.firebasestorage.app",
    messagingSenderId: "585967322120",
    appId: "1:585967322120:web:a74151e658c89d467e3dbd"
  });

  const db = getDatabase(app);

  const WINS = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  let myId = null;
  let myUsername = null;
  let myRole = null;
  let opponentId = null;
  let opponentUsername = null;
  let gameId = null;
  let gameRef = null;
  let gameListener = null;
  let rematchInviteRef = null;
  let rematchInviteWatcher = null;

  // ── screen helpers ──

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showModal(title, body, onAccept, onDecline) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').textContent = body;
    document.getElementById('modal-overlay').classList.add('active');
    document.getElementById('modal-accept').onclick = () => { hideModal(); onAccept(); };
    document.getElementById('modal-decline').onclick = () => { hideModal(); onDecline(); };
  }

  function hideModal() {
    document.getElementById('modal-overlay').classList.remove('active');
  }

  // ── join ──

  async function join() {
    const input = document.getElementById('username-input');
    const name = input.value.trim();
    if (!name) return;

    myUsername = name;
    const playerRef = push(ref(db, 'players'));
    myId = playerRef.key;

    await set(playerRef, { username: name, status: 'waiting', joinedAt: serverTimestamp() });
    onDisconnect(playerRef).remove();

    showScreen('screen-waiting');
    listenForPlayers();
    listenForInvites();
  }

  document.getElementById('username-btn').addEventListener('click', join);
  document.getElementById('username-input').addEventListener('keydown', e => { if (e.key === 'Enter') join(); });

  // ── waiting room ──

  function listenForPlayers() {
    onValue(ref(db, 'players'), snapshot => {
      const data = snapshot.val() || {};
      const list = document.getElementById('player-list');
      list.innerHTML = '';

      Object.entries(data).forEach(([id, player]) => {
        if (player.status !== 'waiting') return;
        const li = document.createElement('li');

        const nameSpan = document.createElement('span');
        nameSpan.className = 'pname' + (id === myId ? ' me' : '');
        nameSpan.textContent = id === myId ? `${player.username} (you)` : player.username;
        li.appendChild(nameSpan);

        if (id !== myId) {
          const btn = document.createElement('button');
          btn.className = 'invite-btn';
          btn.textContent = 'Invite';
          btn.addEventListener('click', () => sendInvite(id, player.username));
          li.appendChild(btn);
        }

        list.appendChild(li);
      });

      const waitingCount = Object.values(data).filter(p => p.status === 'waiting').length;
      document.getElementById('waiting-subtitle').textContent = waitingCount <= 1
        ? 'Waiting for other players to join…'
        : 'Click a player to invite them to a game.';
    });
  }

  async function sendInvite(toId, toUsername) {
    document.getElementById('waiting-status').textContent = `Invite sent to ${toUsername}…`;

    const inviteRef = push(ref(db, 'invites'));
    const inviteId = inviteRef.key;

    await set(inviteRef, {
      from: myId,
      fromUsername: myUsername,
      to: toId,
      toUsername,
      status: 'pending',
      createdAt: serverTimestamp()
    });

    onValue(inviteRef, async snapshot => {
      const invite = snapshot.val();
      if (!invite) { off(inviteRef); return; }

      if (invite.status === 'accepted') {
        off(inviteRef);
        document.getElementById('waiting-status').textContent = '';
        await startGame(inviteId, myId, toId, myUsername, toUsername);
      } else if (invite.status === 'declined') {
        off(inviteRef);
        document.getElementById('waiting-status').textContent = `${toUsername} declined your invite.`;
        await remove(inviteRef);
      }
    });
  }

  function listenForInvites() {
    onValue(ref(db, 'invites'), snapshot => {
      const data = snapshot.val() || {};
      Object.entries(data).forEach(([id, invite]) => {
        if (invite.to !== myId || invite.status !== 'pending') return;

        showModal(
          'Game Invitation',
          `${invite.fromUsername} wants to play Tic Tac Toe with you!`,
          async () => {
            await update(ref(db, `invites/${id}`), { status: 'accepted' });
            watchForGameStart();
          },
          async () => {
            await update(ref(db, `invites/${id}`), { status: 'declined' });
          }
        );
      });
    });
  }

  function watchForGameStart() {
    const myPlayerRef = ref(db, `players/${myId}`);
    onValue(myPlayerRef, snapshot => {
      const data = snapshot.val();
      if (!data || data.status !== 'ingame' || !data.gameId) return;
      off(myPlayerRef);

      get(ref(db, `games/${data.gameId}`)).then(snap => {
        const game = snap.val();
        if (!game) return;
        gameId = data.gameId;
        myRole = game.players.O.id === myId ? 'O' : 'X';
        const theirRole = myRole === 'X' ? 'O' : 'X';
        opponentId = game.players[theirRole].id;
        opponentUsername = game.players[theirRole].username;
        enterGame(gameId, game.players.X.username, game.players.O.username);
      });
    });
  }

  // ── game setup ──

  async function startGame(inviteId, xId, oId, xName, oName) {
    const gRef = push(ref(db, 'games'));
    gameId = gRef.key;

    await set(gRef, {
      board: '.........',
      current: 'X',
      gameOver: false,
      winner: '',
      winCombo: '',
      players: { X: { id: xId, username: xName }, O: { id: oId, username: oName } },
      scores: { X: 0, O: 0, D: 0 },
      createdAt: serverTimestamp()
    });

    await Promise.all([
      update(ref(db, `players/${xId}`), { status: 'ingame', gameId }),
      update(ref(db, `players/${oId}`), { status: 'ingame', gameId })
    ]);

    await remove(ref(db, `invites/${inviteId}`));

    myRole = 'X';
    opponentId = oId;
    opponentUsername = oName;
    enterGame(gameId, xName, oName);
  }

  // ── game screen ──

  function enterGame(gId, xName, oName) {
    gameId = gId;
    gameRef = ref(db, `games/${gId}`);

    document.getElementById('tag-x').textContent = `X: ${xName}`;
    document.getElementById('tag-o').textContent = `O: ${oName}`;
    document.getElementById('outcome-banner').textContent = '';
    document.getElementById('outcome-banner').className = '';
    document.getElementById('post-game').style.display = 'none';
    document.getElementById('rematch-waiting').style.display = 'none';
    document.getElementById('post-game-status').textContent = '';
    document.getElementById('btn-play-again').disabled = false;
    document.getElementById('btn-play-again').textContent = `Play ${opponentUsername} Again`;

    if (gameListener) off(gameRef);
    gameListener = onValue(gameRef, snapshot => {
      const game = snapshot.val();
      if (!game) return;
      renderGame(game);
    });

    showScreen('screen-game');
  }

  function renderGame(game) {
    const cells = document.querySelectorAll('.cell');
    const myTurn = !game.gameOver && game.current === myRole;
    const board = game.board || '.........';
    const winIndices = game.winCombo ? game.winCombo.split(',').map(Number) : [];

    cells.forEach((cell, i) => {
      const val = board[i] === '.' ? '' : board[i];
      cell.textContent = val;
      cell.className = 'cell' + (val ? ` ${val.toLowerCase()} taken` : '') + (myTurn ? '' : ' disabled');
    });

    winIndices.forEach(i => cells[i].classList.add('win'));

    const status = document.getElementById('status');
    const banner = document.getElementById('outcome-banner');

    if (game.gameOver) {
      const iWon  = game.winner === myRole;
      const isDraw = !game.winner;

      if (isDraw) {
        banner.textContent = "It's a draw!";
        banner.className = 'draw';
        status.textContent = '';
      } else if (iWon) {
        banner.textContent = '🎉 You win!';
        banner.className = 'win';
        status.textContent = '';
      } else {
        banner.textContent = 'Better luck next time.';
        banner.className = 'lose';
        status.textContent = '';
      }

      document.getElementById('post-game').style.display = 'flex';
    } else {
      banner.textContent = '';
      banner.className = '';
      const dot = `<span class="turn-indicator turn-${game.current.toLowerCase()}"></span>`;
      const turnName = game.players[game.current].username;
      status.innerHTML = `${dot} ${game.current === myRole ? 'Your turn' : `${turnName}'s turn`}`;
      document.getElementById('post-game').style.display = 'none';
    }

    document.getElementById('score-x').textContent = game.scores.X;
    document.getElementById('score-o').textContent = game.scores.O;
    document.getElementById('score-draw').textContent = game.scores.D;
  }

  // ── moves ──

  document.getElementById('board').addEventListener('click', async e => {
    const cell = e.target.closest('.cell');
    if (!cell || !gameRef) return;

    const snap = await get(gameRef);
    const game = snap.val();
    if (!game || game.gameOver || game.current !== myRole) return;

    const i = parseInt(cell.dataset.i);
    const board = game.board || '.........';
    if (board[i] !== '.') return;

    const newBoard = board.split('');
    newBoard[i] = myRole;
    const newBoardStr = newBoard.join('');

    const winCombo = WINS.find(combo => combo.every(idx => newBoard[idx] === myRole)) || null;
    const isDraw = !winCombo && newBoard.every(v => v !== '.');

    const newScores = { ...game.scores };
    if (winCombo) newScores[myRole]++;
    if (isDraw) newScores.D++;

    await update(gameRef, {
      board: newBoardStr,
      current: myRole === 'X' ? 'O' : 'X',
      gameOver: !!(winCombo || isDraw),
      winner: winCombo ? myRole : '',
      winCombo: winCombo ? winCombo.join(',') : '',
      scores: newScores
    });
  });

  // ── post-game: play opponent again ──

  document.getElementById('btn-play-again').addEventListener('click', async () => {
    document.getElementById('btn-play-again').disabled = true;

    // Send a rematch invite to the opponent
    rematchInviteRef = push(ref(db, 'invites'));
    const inviteId = rematchInviteRef.key;

    await set(rematchInviteRef, {
      from: myId,
      fromUsername: myUsername,
      to: opponentId,
      toUsername: opponentUsername,
      status: 'pending',
      rematch: true,
      createdAt: serverTimestamp()
    });

    // Switch to rematch-waiting UI
    document.getElementById('post-game').style.display = 'none';
    document.getElementById('rematch-waiting').style.display = 'flex';
    document.getElementById('rematch-status').textContent = `Invitation sent to ${opponentUsername}! Waiting for response…`;

    rematchInviteWatcher = onValue(rematchInviteRef, async snapshot => {
      const invite = snapshot.val();
      if (!invite) { off(rematchInviteRef); return; }

      if (invite.status === 'accepted') {
        off(rematchInviteRef);
        rematchInviteWatcher = null;
        // Clean up old game, start fresh
        if (gameListener && gameRef) { off(gameRef); gameListener = null; }
        await startGame(inviteId, myId, opponentId, myUsername, opponentUsername);
      } else if (invite.status === 'declined') {
        off(rematchInviteRef);
        rematchInviteWatcher = null;
        document.getElementById('rematch-status').textContent = `${opponentUsername} declined. Choose another option below.`;
        await remove(rematchInviteRef);
      }
    });
  });

  // ── post-game: play someone else ──

  document.getElementById('btn-play-someone-else').addEventListener('click', () => goToWaitingRoom());
  document.getElementById('btn-rematch-someone-else').addEventListener('click', async () => {
    await cancelRematchInvite();
    goToWaitingRoom();
  });

  // ── post-game: exit ──

  document.getElementById('btn-exit-game').addEventListener('click', () => exitGame());
  document.getElementById('btn-rematch-exit').addEventListener('click', async () => {
    await cancelRematchInvite();
    exitGame();
  });

  async function cancelRematchInvite() {
    if (rematchInviteWatcher && rematchInviteRef) {
      off(rematchInviteRef);
      rematchInviteWatcher = null;
      await remove(rematchInviteRef);
      rematchInviteRef = null;
    }
  }

  async function goToWaitingRoom() {
    if (gameListener && gameRef) { off(gameRef); gameListener = null; }
    await update(ref(db, `players/${myId}`), { status: 'waiting', gameId: null });
    document.getElementById('post-game').style.display = 'none';
    document.getElementById('rematch-waiting').style.display = 'none';
    showScreen('screen-waiting');
  }

  async function exitGame() {
    if (gameListener && gameRef) { off(gameRef); gameListener = null; }
    await remove(ref(db, `players/${myId}`));
    document.getElementById('post-game').style.display = 'none';
    document.getElementById('rematch-waiting').style.display = 'none';
    showScreen('screen-splash');
  }
</script>
</body>
</html>
