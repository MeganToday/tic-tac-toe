<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #eee;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      color: #e94560;
    }

    .status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.8rem;
      color: #a8dadc;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
      margin: 0 auto 1.5rem;
      width: fit-content;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x {
      color: #e94560;
    }

    .cell.o {
      color: #a8dadc;
    }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    .scores {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1.5rem;
    }

    .score-box {
      background: #16213e;
      border-radius: 10px;
      padding: 0.6rem 1.4rem;
      min-width: 80px;
    }

    .score-box .label {
      font-size: 0.75rem;
      letter-spacing: 2px;
      color: #888;
      text-transform: uppercase;
    }

    .score-box .value {
      font-size: 1.8rem;
      font-weight: bold;
    }

    .score-box.x-score .value { color: #e94560; }
    .score-box.o-score .value { color: #a8dadc; }
    .score-box.draw-score .value { color: #888; }

    button {
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.7rem 2rem;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover {
      background: #c73652;
      transform: scale(1.04);
    }

    .turn-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .turn-x { background: #e94560; }
    .turn-o { background: #a8dadc; }
  </style>
</head>
<body>
  <div class="container">
    <h1>TIC TAC TOE</h1>

    <div class="scores">
      <div class="score-box x-score">
        <div class="label">X</div>
        <div class="value" id="score-x">0</div>
      </div>
      <div class="score-box draw-score">
        <div class="label">Draw</div>
        <div class="value" id="score-draw">0</div>
      </div>
      <div class="score-box o-score">
        <div class="label">O</div>
        <div class="value" id="score-o">0</div>
      </div>
    </div>

    <div class="status" id="status"></div>

    <div class="board" id="board">
      <div class="cell" data-i="0"></div>
      <div class="cell" data-i="1"></div>
      <div class="cell" data-i="2"></div>
      <div class="cell" data-i="3"></div>
      <div class="cell" data-i="4"></div>
      <div class="cell" data-i="5"></div>
      <div class="cell" data-i="6"></div>
      <div class="cell" data-i="7"></div>
      <div class="cell" data-i="8"></div>
    </div>

    <button id="reset-btn">New Game</button>
  </div>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, scores;

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      if (!scores) scores = { X: 0, O: 0, D: 0 };
      render();
    }

    function render() {
      const cells = document.querySelectorAll('.cell');
      cells.forEach((cell, i) => {
        cell.textContent = board[i] || '';
        cell.className = 'cell' + (board[i] ? ` ${board[i].toLowerCase()} taken` : '');
      });

      const status = document.getElementById('status');
      if (!gameOver) {
        const dot = `<span class="turn-indicator turn-${current.toLowerCase()}"></span>`;
        status.innerHTML = `${dot} Player <strong>${current}</strong>'s turn`;
      }

      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-draw').textContent = scores.D;
    }

    function checkWin(player) {
      return WINS.find(combo => combo.every(i => board[i] === player)) || null;
    }

    function handleClick(e) {
      const cell = e.target.closest('.cell');
      if (!cell || gameOver) return;
      const i = parseInt(cell.dataset.i);
      if (board[i]) return;

      board[i] = current;
      render();

      const winCombo = checkWin(current);
      if (winCombo) {
        gameOver = true;
        scores[current]++;
        winCombo.forEach(i => document.querySelectorAll('.cell')[i].classList.add('win'));
        document.getElementById('status').innerHTML =
          `<strong>${current}</strong> wins! `;
        document.getElementById('score-x').textContent = scores.X;
        document.getElementById('score-o').textContent = scores.O;
        return;
      }

      if (board.every(v => v)) {
        gameOver = true;
        scores.D++;
        document.getElementById('status').textContent = "It's a draw!";
        document.getElementById('score-draw').textContent = scores.D;
        return;
      }

      current = current === 'X' ? 'O' : 'X';
      render();
    }

    document.getElementById('board').addEventListener('click', handleClick);
    document.getElementById('reset-btn').addEventListener('click', init);

    init();
  </script>
</body>
</html>
